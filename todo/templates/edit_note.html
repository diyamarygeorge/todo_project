{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Edit Note - My ToDo</title>
    <link rel="stylesheet" href="{% static 'todo.css' %}">
</head>
<body>

<div class="todo-container">
    <h2>Edit Note</h2>

    <form method="POST">
        {% csrf_token %}
        {{ form.note }}
        <button type="submit">Save</button>
    </form>

    <a href="{% url 'home' %}" class="back-link">Cancel</a>
</div>

</body>
</html>
