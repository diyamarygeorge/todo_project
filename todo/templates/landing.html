<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ToDo App</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .box {
            background: white;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            width: 320px;
        }

        h1 {
            margin-bottom: 10px;
        }

        p {
            color: #555;
            margin-bottom: 25px;
        }

        a {
            display: block;
            text-decoration: none;
            padding: 12px;
            margin: 10px 0;
            border-radius: 6px;
            font-weight: bold;
        }

        .login {
            background: #4f46e5;
            color: white;
        }

        .register {
            border: 2px solid #4f46e5;
            color: #4f46e5;
        }
    </style>
</head>
<body>

    <div class="box">
        <h1>📝 ToDo App</h1>
        <p>Manage your notes easily</p>

        <a href="{% url 'login' %}" class="login">Login</a>
        <a href="{% url 'register' %}" class="register">Register</a>
    </div>

</body>
</html>
